<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0d1117; color: #e6edf3; height: 100vh;
         display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { padding: 10px 14px; border-bottom: 1px solid #21262d;
           display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  header h1 { font-size: 13px; font-weight: 700; color: #58a6ff; letter-spacing: .3px; }
  #conn-dot { width: 7px; height: 7px; border-radius: 50%; background: #3d444d;
              margin-left: auto; flex-shrink: 0; }
  #conn-dot.live { background: #3fb950; }
  #conn-dot.err  { background: #f85149; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid #21262d; flex-shrink: 0; }
  .tab { flex: 1; padding: 7px 0; font-size: 12px; font-weight: 600; text-align: center;
         color: #6e7681; cursor: pointer; border-bottom: 2px solid transparent;
         transition: color .15s; user-select: none; }
  .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }

  /* Panels */
  .panel { flex: 1; overflow-y: auto; padding: 10px; display: none; }
  .panel.active { display: block; }

  /* Session Cards */
  .session-card { background: #161b22; border: 1px solid #21262d; border-radius: 6px;
                  padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
                  transition: border-color .12s; }
  .session-card:hover { border-color: #58a6ff44; }
  .session-card.waiting { border-color: #d29922; }
  .session-card.stale { opacity: .45; }

  .card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .ticket { font-size: 13px; font-weight: 700; color: #58a6ff; }
  .project { font-size: 11px; color: #6e7681; }
  .badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
           margin-left: auto; white-space: nowrap; }
  .badge.running  { background: #1f6feb22; color: #58a6ff; }
  .badge.waiting  { background: #9e6a0322; color: #d29922; animation: blink 1.8s infinite; }
  .badge.starting { background: #21262d; color: #6e7681; }
  .badge.stale    { background: #21262d; color: #484f58; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

  .card-tool { font-size: 11px; color: #6e7681; white-space: nowrap;
               overflow: hidden; text-overflow: ellipsis; }
  .card-tool b { color: #8b949e; font-weight: 600; }
  .branch { font-size: 10px; color: #3d444d; font-family: monospace; margin-top: 2px; }

  details { margin-top: 6px; }
  summary { font-size: 10px; color: #484f58; cursor: pointer; user-select: none; }
  .act-item { font-size: 10px; font-family: monospace; display: flex; gap: 6px;
              color: #6e7681; padding: 1px 0; }
  .act-item .t { color: #58a6ff; width: 52px; flex-shrink: 0; overflow: hidden;
                 text-overflow: ellipsis; }
  .act-item .p { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Launch panel */
  .repo-block { margin-bottom: 14px; }
  .repo-name { font-size: 11px; font-weight: 700; color: #8b949e; margin-bottom: 6px;
               text-transform: uppercase; letter-spacing: .4px; }
  select { width: 100%; padding: 6px 8px; background: #161b22; border: 1px solid #21262d;
           border-radius: 5px; color: #e6edf3; font-size: 12px; margin-bottom: 6px;
           cursor: pointer; }
  .launch-btn { width: 100%; padding: 7px; background: #1f6feb; border: none;
                border-radius: 5px; color: #fff; font-size: 12px; font-weight: 600;
                cursor: pointer; transition: background .12s; }
  .launch-btn:hover { background: #388bfd; }

  /* Status bar */
  #status { font-size: 10px; color: #484f58; padding: 4px 14px;
            border-top: 1px solid #21262d; flex-shrink: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .empty { font-size: 12px; color: #484f58; text-align: center; margin-top: 24px; }
</style>
</head>
<body>

<header>
  <h1>Claude Sessions</h1>
  <div id="conn-dot" title="SSE connection"></div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('sessions', this)">Sessions</div>
  <div class="tab" onclick="switchTab('launch', this)">Launch</div>
</div>

<div id="sessions" class="panel active">
  <div id="session-list"><p class="empty">Waiting for sessions…</p></div>
</div>

<div id="launch" class="panel">
  <div id="repos-container"><p class="empty">Loading…</p></div>
</div>

<div id="status">Ready</div>

<script>
const AGENT = '/agent';
let worktrees = {};

function switchTab(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

// SSE
let evtSource = null;
function connectSSE() {
  evtSource = new EventSource('/events');
  evtSource.onopen = () => dot('live');
  evtSource.onmessage = e => renderSessions(JSON.parse(e.data));
  evtSource.onerror = () => { dot('err'); evtSource.close(); setTimeout(connectSSE, 3000); };
}
function dot(cls) { document.getElementById('conn-dot').className = cls; }

function renderSessions(sessions) {
  const list = document.getElementById('session-list');
  if (!sessions.length) { list.innerHTML = '<p class="empty">No active sessions</p>'; return; }
  list.innerHTML = sessions.map(renderCard).join('');
  list.querySelectorAll('.session-card').forEach((el, i) =>
    el.addEventListener('click', () => focusSession(sessions[i]))
  );
}

function renderCard(s) {
  const ticket = s.ticket || basename(s.cwd || '');
  const project = basename(s.cwd || '');
  const status = s.stale ? 'stale' : (s.status || 'starting');
  const label = { running:'running', waiting:'waiting', starting:'…', stale:'stale' }[status] || status;
  const tool = s.currentTool
    ? `<b>${esc(s.currentTool)}</b> ${esc(s.currentTarget || '')}`
    : '';
  const acts = (s.recentActivity || []).slice(-5).reverse()
    .map(a => `<div class="act-item"><span class="t">${esc(a.tool)}</span><span class="p">${esc(a.target||'')}</span></div>`)
    .join('');
  return `<div class="session-card ${status}">
    <div class="card-top">
      <span class="ticket">${esc(ticket)}</span>
      <span class="project">${esc(project)}</span>
      <span class="badge ${status}">${label}</span>
    </div>
    ${tool ? `<div class="card-tool">${tool}</div>` : ''}
    <div class="branch">${esc(s.branch||'')}</div>
    ${acts ? `<details><summary>activity</summary>${acts}</details>` : ''}
  </div>`;
}

async function focusSession(s) {
  if (!s.hwnd || s.hwnd === 0) { setStatus('No window handle'); return; }
  try {
    await fetch(`${AGENT}/focus`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ hwnd: s.hwnd })
    });
  } catch(e) { setStatus('Agent unreachable'); }
}

async function loadLaunch() {
  try {
    const cfg = await fetch('/config').then(r => r.json());
    const wt  = await fetch(`${AGENT}/worktrees`).then(r => r.json()).catch(() => ({}));
    worktrees = wt;
    const container = document.getElementById('repos-container');
    if (!cfg.repos?.length) { container.innerHTML = '<p class="empty">No repos configured</p>'; return; }
    container.innerHTML = cfg.repos.map(repo => {
      const wts = (worktrees[repo.name] || []).filter(w => w.path !== repo.path);
      const opts = [
        `<option value="${esc(repo.path)}" data-label="${esc(repo.name)}">(main)</option>`,
        ...wts.map(w => `<option value="${esc(w.path)}" data-label="${esc(repo.name)}: ${esc(w.branch)}">${esc(w.branch)} (${esc(w.head)})</option>`)
      ].join('');
      return `<div class="repo-block">
        <div class="repo-name">${esc(repo.name)}</div>
        <select id="sel-${esc(repo.name)}">${opts}</select>
        <button class="launch-btn" onclick='launch(${JSON.stringify(repo.name)})'>Launch Claude</button>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('repos-container').innerHTML = '<p class="empty">Could not load config</p>';
  }
}

async function launch(repoName) {
  const sel   = document.getElementById(`sel-${repoName}`);
  const btn   = sel.nextElementSibling;
  const path  = sel.value;
  const label = sel.selectedOptions[0]?.dataset.label || repoName;

  btn.textContent = 'Launching…';
  btn.disabled = true;
  btn.style.background = '#388bfd';

  try {
    const r = await fetch(`${AGENT}/launch`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ path, label })
    });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = 'Launched!';
      btn.style.background = '#238636';
      setTimeout(() => { btn.textContent = 'Launch Claude'; btn.style.background = ''; btn.disabled = false; }, 3000);
    } else {
      btn.textContent = `Error: ${d.error}`;
      btn.style.background = '#b62324';
      setTimeout(() => { btn.textContent = 'Launch Claude'; btn.style.background = ''; btn.disabled = false; }, 4000);
    }
  } catch(e) {
    btn.textContent = 'Agent unreachable';
    btn.style.background = '#b62324';
    setTimeout(() => { btn.textContent = 'Launch Claude'; btn.style.background = ''; btn.disabled = false; }, 4000);
  }
}

function basename(p) { return p.replace(/\\/g,'/').split('/').filter(Boolean).pop() || p; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setStatus(m) { document.getElementById('status').textContent = m; }

connectSSE();
loadLaunch();
</script>
</body>
</html>
